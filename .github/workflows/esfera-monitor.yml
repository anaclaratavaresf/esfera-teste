name: Esfera Monitor (nuvem)

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC = 09:00 no horario de Brasilia (BRT, UTC-3)
  workflow_dispatch:        # permite rodar na mao pelo botao "Run workflow"

permissions:
  contents: write

jobs:
  monitorar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Instalar dependencias
        run: pip install selenium requests pillow

      - name: Rodar o monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          USE_UNDETECTED: 'false'
          HEADLESS: 'true'
          MONITOR_BANNER: 'true'
          THRESHOLD_PERCENT: '50'
        run: python esfera_monitor.py

      - name: Salvar estado (anti-duplicata + baseline do banner)
        if: always()
        run: |
          git config user.name  "esfera-bot"
          git config user.email "esfera-bot@users.noreply.github.com"
          git add esfera_state.json banner_*.png 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Atualiza estado do monitor [skip ci]"
            git push
          else
            echo "Nada mudou no estado — nada pra commitar."
          fi
