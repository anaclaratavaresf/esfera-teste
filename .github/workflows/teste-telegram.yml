name: Teste Telegram (nuvem)

on:
  workflow_dispatch:

jobs:
  avisar:
    runs-on: ubuntu-latest
    steps:
      - name: Mandar mensagem de teste no Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="✅ Teste da nuvem: o Esfera Monitor está conectado ao seu Telegram. Pode apagar este workflow."
